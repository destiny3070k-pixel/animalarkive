<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Arkive</title>
    <style>
        /* 간단한 화면 전환을 위한 스타일 */
        .auth-section { margin-bottom: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>🦁 Animal Arkive 🐯</h1>
    
    <div class="auth-section">
        <div id="logged-out-view">
            <p>Animal Arkive에 오신 것을 환영합니다. 서비스를 이용하시려면 로그인해 주세요.</p>
            <button id="btn-login">구글 계정으로 로그인 / 가입</button>
        </div>

        <div id="nickname-setup-view" class="hidden">
            <p>처음 오셨군요! 사용할 닉네임을 설정해 주세요.</p>
            <input type="text" id="input-nickname" placeholder="닉네임 입력">
            <button id="btn-save-nickname">닉네임 저장</button>
        </div>

        <div id="logged-in-view" class="hidden">
            <p><strong id="user-display-name"></strong>님 환영합니다! (동물원 멤버 인증 완료)</p>
            <button id="btn-logout">로그아웃</button>
        </div>
    </div>

    <hr>

    <div id="main-content" class="hidden">
        <h3>덕질 데이터베이스</h3>
        <div id="data-container">데이터를 불러오는 중...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
        // 필요한 인증(Auth) 및 리얼타임 데이터베이스(Database) 라이브러리 추가
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        // 보내주신 Animal Arkive 전용 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyA1iKzTmqbxCdI2Gzi6ivzSNRHLpwZuLiM",
            authDomain: "sbculture-48718.firebaseapp.com",
            databaseURL: "https://sbculture-48718-default-rtdb.firebaseio.com",
            projectId: "sbculture-48718",
            storageBucket: "sbculture-48718.firebasestorage.app",
            messagingSenderId: "1025788773622",
            appId: "1:1025788773622:web:76ad9df2ee4da23437d8d7",
            measurementId: "G-N4QHZK9LX9"
        };

        // 초기화
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // UI 엘리먼트 정의
        const viewLoggedOut = document.getElementById('logged-out-view');
        const viewNicknameSetup = document.getElementById('nickname-setup-view');
        const viewLoggedIn = document.getElementById('logged-in-view');
        const viewMainContent = document.getElementById('main-content');

        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const btnSaveNickname = document.getElementById('btn-save-nickname');
        const inputNickname = document.getElementById('input-nickname');
        const userDisplayName = document.getElementById('user-display-name');

        let currentUser = null;

        // [기능 1] 구글 로그인 팝업 실행
        btnLogin.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("구글 인증 성공:", result.user.displayName);
                })
                .catch((error) => {
                    console.error("로그인 실패:", error.message);
                    alert("로그인 중 오류가 발생했습니다: " + error.message);
                });
        });

        // [기능 2] 로그아웃
        btnLogout.addEventListener('click', () => {
            signOut(auth).then(() => {
                console.log("로그아웃 완료");
                window.location.reload(); // 깔끔한 상태 초기화를 위해 새로고침
            });
        });

        // [기능 3] 첫 로그인 유저 닉네임 데이터베이스에 저장
        btnSaveNickname.addEventListener('click', () => {
            const nickname = inputNickname.value.trim();
            if (!nickname) {
                alert("닉네임을 입력해 주세요!");
                return;
            }

            if (currentUser) {
                // 데이터베이스의 'users/유저고유ID' 경로에 닉네임과 이메일 기록
                set(ref(database, 'users/' + currentUser.uid), {
                    nickname: nickname,
                    email: currentUser.email
                }).then(() => {
                    alert("닉네임 설정이 완료되었습니다!");
                    checkUserNickname(currentUser); // 화면 갱신
                }).catch((error) => {
                    console.error("닉네임 저장 실패:", error);
                });
            }
        });

        // [기능 4] 유저의 닉네임 설정 여부 체크 및 화면 전환
        function checkUserNickname(user) {
            const userRef = ref(database, 'users/' + user.uid);
            
            get(userRef).then((snapshot) => {
                if (snapshot.exists() && snapshot.val().nickname) {
                    // 1) 데이터베이스에 닉네임이 이미 존재하는 경우 (로그인 완료 상태)
                    const savedNickname = snapshot.val().nickname;
                    
                    userDisplayName.innerText = savedNickname;
                    
                    viewLoggedOut.classList.add('hidden');
                    viewNicknameSetup.classList.add('hidden');
                    viewLoggedIn.classList.remove('hidden');
                    viewMainContent.classList.remove('hidden'); // 메인 기능 오픈
                    
                    // 로그인과 닉네임 인증이 모두 끝났으므로 데이터 로드 시작
                    loadDatabaseData();
                } else {
                    // 2) 구글 로그인은 됐으나 데이터베이스에 닉네임이 없는 경우 (최초 가입 상태)
                    viewLoggedOut.classList.add('hidden');
                    viewNicknameSetup.classList.remove('hidden');
                    viewLoggedIn.classList.add('hidden');
                    viewMainContent.classList.add('hidden');
                }
            }).catch((error) => {
                console.error("유저 정보 조회 실패:", error);
            });
        }

        // [기능 5] 로그인 상태 실시간 감지 트리거
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                checkUserNickname(user); // 닉네임 유무 체크 함수 실행
            } else {
                currentUser = null;
                // 로그아웃 상태일 때 UI 정리
                viewLoggedOut.classList.remove('hidden');
                viewNicknameSetup.classList.add('hidden');
                viewLoggedIn.classList.add('hidden');
                viewMainContent.classList.add('hidden');
            }
        });

        // [기능 6] 메인 덕질 데이터 불러오기 함수
        function loadDatabaseData() {
            // 데이터베이스의 'archive' 경로에 있는 데이터를 실시간 조회 (원하는 경로로 변경 가능)
            const archiveRef = ref(database, 'archive'); 
            onValue(archiveRef, (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById('data-container');
                if (data) {
                    container.innerText = JSON.stringify(data, null, 2);
                } else {
                    container.innerText = "아직 저장된 아카이브 데이터가 없습니다. 파이어베이스 콘솔에서 데이터를 추가해 보세요!";
                }
            });
        }
    </script>
</body>
</html>
